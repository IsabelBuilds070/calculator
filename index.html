<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <style>
*{
    box-sizing: border-box;
    margin: 0;
    padding: 0;
    }

.calculator {
    width: 400px;
    padding: 20px;
    border-radius: 10px;
    background: #2c2c44;
    box-shadow: 0 4px 10px rgba(0, 0, 0, 0.3);
}

body {
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
    background-color: #1e1e2f;
    font-family: Arial, sans-serif;
}


#display {
    width: 100%;
    height: 60px;
    margin-bottom: 15px;
    text-align: right;
    padding: 10px;
    font-size: 24px;
    border: none;
    border-radius: 10px;
    background: #1e1e2f;
    color: white;
}

.buttons {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
}

button {
    padding: 18px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    background: #3a3a55;
    color: white;
    transition: 0.2s ease;
}

button:hover {
    background: #50507a;
}

.equal {
    background: #ff9500;
    grid-row: span 2;
}

.equal:hover {
    background: #e08900;
}

.zero {
    grid-column: span 2;
}
    </style>
</head>
<body>
    <div class="calculator">
        <input type="text" id="display">

        <div class="buttons">
            <button onclick="clearDisplay()">AC</button>
            <button onclick="deleteLast()">DEL</button>
            <button onclick="showData('/')">/</button>
            <button onclick="showData('*')">*</button>

            <button onclick="showData('7')">7</button>
            <button onclick="showData('8')">8</button>
            <button onclick="showData('9')">9</button>
            <button onclick="showData('-')">-</button>

            <button onclick="showData('4')">4</button>
            <button onclick="showData('5')">5</button>
            <button onclick="showData('6')">6</button>
            <button onclick="showData('+')">+</button>

            <button onclick="showData('1')">1</button>
            <button onclick="showData('2')">2</button>
            <button onclick="showData('3')">3</button>
            <button class="equal" onclick="calculate()">=</button>

            <button class="zero" onclick="showData('0')">0</button>
            <button onclick="showData('.')">.</button>
        </div>
    <script>
        function showData(value) {
            document.getElementById('display').value += value;
        }

        function clearDisplay() {
            document.getElementById('display').value = '';
        }

        function calculate() {
            try {
                const result = eval(document.getElementById('display').value);
                document.getElementById('display').value = result;
            } catch (error) {
                document.getElementById('display').value = 'Error';
            }
        }
    </script>
</div>
</body>
</html>
